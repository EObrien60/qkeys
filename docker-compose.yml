# Local dependencies for developing and testing qkeys.
#
#   docker compose up -d
#   DATABASE_URL=postgres://postgres:postgres@localhost:5432/qkeys_dev pnpm test
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qkeys_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 20
